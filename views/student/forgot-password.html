<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Forgot Password – OGMS</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="school-logo"><i class="fas fa-key"></i></div>
        <h2>Forgot Password</h2>
        <p class="subtitle">
          Enter your registered email and we'll send a reset link.
        </p>

        <div id="stepRequest">
          <form onsubmit="sendReset(event)">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-envelope"></i
                ></span>
                <input
                  type="email"
                  id="resetEmail"
                  class="form-control"
                  placeholder="you@lnhs.edu.ph"
                  required
                />
              </div>
            </div>
            <button type="submit" class="btn-primary-custom">
              <i class="fas fa-paper-plane me-2"></i>Send Reset Link
            </button>
          </form>
        </div>

        <div id="stepSuccess" style="display: none; text-align: center">
          <div
            style="font-size: 3rem; color: var(--success); margin-bottom: 1rem"
          >
            <i class="fas fa-check-circle"></i>
          </div>
          <h5 style="font-weight: 700">Email Sent!</h5>
          <p style="font-size: 0.875rem; color: #64748b">
            A password reset link has been sent to your email.<br />
            <em>(This is a prototype — no actual email is sent.)</em>
          </p>
          <a href="../../index.html" class="btn-primary-custom d-block mt-3">
            <i class="fas fa-arrow-left me-2"></i>Back to Login
          </a>
        </div>

        <div class="text-center mt-3">
          <a
            href="../../index.html"
            style="color: var(--primary); font-size: 0.85rem; font-weight: 500"
          >
            <i class="fas fa-arrow-left me-1"></i>Back to Login
          </a>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../data/mock-data.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function sendReset(e) {
        e.preventDefault();
        const email = document
          .getElementById("resetEmail")
          .value.trim()
          .toLowerCase();
        simulateLoading(() => {
          const students = getStudents();
          const found = students.find((s) => s.email.toLowerCase() === email);
          if (found) {
            document.getElementById("stepRequest").style.display = "none";
            document.getElementById("stepSuccess").style.display = "block";
          } else {
            showToast("No account found with that email.", "error");
          }
        });
      }
    </script>
  </body>
</html>
