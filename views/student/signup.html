<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Sign Up – OGMS</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card" style="max-width: 520px">
        <div class="school-logo"><i class="fas fa-user-plus"></i></div>
        <h2>Create Account</h2>
        <p class="subtitle">
          Register as a student of Lubo National High School
        </p>

        <form id="signupForm" onsubmit="handleSignup(event)">
          <div class="row g-3">
            <div class="col-6">
              <label class="form-label">First Name</label>
              <input
                type="text"
                id="signupFirst"
                class="form-control"
                placeholder="Juan"
                required
              />
            </div>
            <div class="col-6">
              <label class="form-label">Last Name</label>
              <input
                type="text"
                id="signupLast"
                class="form-control"
                placeholder="dela Cruz"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label">Email Address</label>
              <input
                type="email"
                id="signupEmail"
                class="form-control"
                placeholder="you@lnhs.edu.ph"
                required
              />
            </div>
            <div class="col-6">
              <label class="form-label">Grade Level</label>
              <select id="signupGrade" class="form-select" required>
                <option value="">Select</option>
                <option>7</option>
                <option>8</option>
                <option>9</option>
                <option>10</option>
                <option>11</option>
                <option>12</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">Section</label>
              <input
                type="text"
                id="signupSection"
                class="form-control"
                placeholder="Rizal"
                required
              />
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input
                  type="password"
                  id="signupPwd"
                  class="form-control"
                  placeholder="Min. 6 characters"
                  required
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="togglePwd('signupPwd', this)"
                  style="border-radius: 0 8px 8px 0"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Confirm Password</label>
              <input
                type="password"
                id="signupPwd2"
                class="form-control"
                placeholder="Repeat password"
                required
              />
            </div>
            <div class="col-12">
              <div class="form-check">
                <input
                  type="checkbox"
                  class="form-check-input"
                  id="agreeTerms"
                  required
                />
                <label class="form-check-label" style="font-size: 0.8rem">
                  I agree to the
                  <a href="#" style="color: var(--primary)"
                    >terms and conditions</a
                  >
                </label>
              </div>
            </div>
          </div>
          <button type="submit" class="btn-primary-custom mt-3">
            <i class="fas fa-user-plus me-2"></i>Create Account
          </button>
        </form>

        <div class="text-center mt-3">
          <span style="font-size: 0.85rem; color: #64748b"
            >Already have an account?
          </span>
          <a
            href="../../index.html"
            style="color: var(--primary); font-weight: 600; font-size: 0.85rem"
            >Sign In</a
          >
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../data/mock-data.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      function togglePwd(id, btn) {
        const el = document.getElementById(id);
        const show = el.type === "password";
        el.type = show ? "text" : "password";
        btn.innerHTML = `<i class="fas fa-eye${show ? "-slash" : ""}"></i>`;
      }

      function handleSignup(e) {
        e.preventDefault();
        const pwd = document.getElementById("signupPwd").value;
        const pwd2 = document.getElementById("signupPwd2").value;
        if (pwd !== pwd2) {
          showToast("Passwords do not match!", "error");
          return;
        }
        if (pwd.length < 6) {
          showToast("Password must be at least 6 characters.", "error");
          return;
        }

        const firstName = document.getElementById("signupFirst").value.trim();
        const lastName = document.getElementById("signupLast").value.trim();
        const email = document
          .getElementById("signupEmail")
          .value.trim()
          .toLowerCase();
        const students = getStudents();

        if (students.find((s) => s.email.toLowerCase() === email)) {
          showToast("Email already registered.", "error");
          return;
        }

        simulateLoading(() => {
          const newId = "S" + Date.now();
          const stuId = "2024-" + String(students.length + 1).padStart(4, "0");
          const student = {
            id: newId,
            studentId: stuId,
            firstName,
            lastName,
            name: `${firstName} ${lastName}`,
            email,
            password: pwd,
            gradeLevel: document.getElementById("signupGrade").value,
            section: document.getElementById("signupSection").value.trim(),
            contact: "",
            address: "",
            gender: "",
            birthdate: "",
            guardianName: "",
            guardianContact: "",
            enrollmentStatus: "Enrolled",
            role: "student",
            avatar: null,
          };
          students.push(student);
          saveStudents(students);
          showToast(
            "Account created successfully! You can now log in.",
            "success",
          );
          setTimeout(() => (window.location.href = "../../index.html"), 1500);
        });
      }
    </script>
  </body>
</html>
