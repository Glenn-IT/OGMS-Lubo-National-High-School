<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Profile – OGMS Student</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../../assets/css/style.css" />
  </head>
  <body>
    <div class="app-wrapper">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo">
            <div class="logo-icon"><i class="fas fa-graduation-cap"></i></div>
            <div class="logo-text">
              <strong>OGMS</strong><span>Lubo Nat'l High School</span>
            </div>
          </div>
        </div>
        <div class="sidebar-user">
          <div class="user-avatar" id="sidebarAvatar">JD</div>
          <div class="user-info">
            <strong id="sidebarName">Loading...</strong
            ><span id="sidebarStudentId">—</span>
          </div>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-section-label">Main Menu</div>
          <a href="dashboard.html" class="sidebar-link"
            ><i class="fas fa-th-large"></i> Dashboard</a
          >
          <a href="grades.html" class="sidebar-link"
            ><i class="fas fa-list-alt"></i> My Grades</a
          >
          <a href="analytics.html" class="sidebar-link"
            ><i class="fas fa-chart-bar"></i> Analytics</a
          >
          <a href="reports.html" class="sidebar-link"
            ><i class="fas fa-file-alt"></i> Reports</a
          >
          <div class="nav-section-label" style="margin-top: 0.5rem">
            Account
          </div>
          <a href="profile.html" class="sidebar-link active"
            ><i class="fas fa-user-circle"></i> Profile</a
          >
        </nav>
        <div class="sidebar-footer">
          <button class="btn-logout" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
          </button>
        </div>
      </aside>

      <div class="main-content">
        <header class="topbar">
          <div class="topbar-left">
            <button class="topbar-btn hamburger">
              <i class="fas fa-bars"></i>
            </button>
            <div>
              <div class="topbar-title">My Profile</div>
              <div class="topbar-subtitle">
                View and edit your student information
              </div>
            </div>
          </div>
          <div class="topbar-right">
            <button class="btn btn-primary btn-sm" onclick="openEditModal()">
              <i class="fas fa-edit me-1"></i>Edit Profile
            </button>
            <div class="topbar-avatar" id="topbarAvatar">JD</div>
          </div>
        </header>

        <main class="page-content fade-in">
          <div class="row g-3">
            <!-- Profile Card -->
            <div class="col-md-4">
              <div class="content-card">
                <div class="card-body-custom text-center py-4">
                  <div class="profile-avatar-lg" id="profileAvatarLg">
                    <span id="profileInitials">JD</span>
                    <div class="edit-avatar" onclick="openEditModal()">
                      <i class="fas fa-camera"></i>
                    </div>
                  </div>
                  <h5 class="fw-bold mb-1" id="profileName">—</h5>
                  <p
                    class="text-muted mb-1"
                    style="font-size: 0.85rem"
                    id="profileStudentId"
                  >
                    —
                  </p>
                  <span class="badge bg-primary" id="profileGradeSection"
                    >—</span
                  >
                  <hr />
                  <div class="d-flex justify-content-around">
                    <div class="text-center">
                      <div
                        style="
                          font-size: 1.3rem;
                          font-weight: 800;
                          color: var(--primary);
                        "
                        id="profileAvg"
                      >
                        —
                      </div>
                      <div style="font-size: 0.72rem; color: #64748b">
                        Avg Grade
                      </div>
                    </div>
                    <div class="text-center">
                      <div
                        style="
                          font-size: 1.3rem;
                          font-weight: 800;
                          color: var(--success);
                        "
                        id="profilePassed"
                      >
                        —
                      </div>
                      <div style="font-size: 0.72rem; color: #64748b">
                        Passed
                      </div>
                    </div>
                    <div class="text-center">
                      <div
                        style="
                          font-size: 1.3rem;
                          font-weight: 800;
                          color: var(--info);
                        "
                        id="profileSubjects"
                      >
                        —
                      </div>
                      <div style="font-size: 0.72rem; color: #64748b">
                        Subjects
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <!-- Details -->
            <div class="col-md-8">
              <div class="content-card mb-3">
                <div class="card-header-custom">
                  <span class="card-title"
                    ><i class="fas fa-user me-2 text-primary"></i>Personal
                    Information</span
                  >
                  <button
                    class="btn-sm-custom btn-edit"
                    onclick="openEditModal()"
                  >
                    <i class="fas fa-edit"></i> Edit
                  </button>
                </div>
                <div class="card-body-custom" id="personalInfo"></div>
              </div>
              <div class="content-card">
                <div class="card-header-custom">
                  <span class="card-title"
                    ><i class="fas fa-school me-2 text-success"></i>Academic
                    Information</span
                  >
                </div>
                <div class="card-body-custom" id="academicInfo"></div>
              </div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
      <div
        class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable"
      >
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">
              <i class="fas fa-user-edit me-2"></i>Edit Profile
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editProfileForm">
              <div class="row g-3">
                <div class="col-md-6">
                  <label class="form-label">First Name</label>
                  <input
                    type="text"
                    id="editFirst"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Last Name</label>
                  <input
                    type="text"
                    id="editLast"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Email</label>
                  <input
                    type="email"
                    id="editEmail"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Contact Number</label>
                  <input type="text" id="editContact" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Birthdate</label>
                  <input type="date" id="editBirthdate" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Gender</label>
                  <select id="editGender" class="form-select">
                    <option value="">Select</option>
                    <option>Male</option>
                    <option>Female</option>
                  </select>
                </div>
                <div class="col-12">
                  <label class="form-label">Address</label>
                  <input type="text" id="editAddress" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Guardian Name</label>
                  <input type="text" id="editGuardian" class="form-control" />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Guardian Contact</label>
                  <input
                    type="text"
                    id="editGuardianContact"
                    class="form-control"
                  />
                </div>
                <div class="col-12">
                  <hr />
                  <h6 class="text-muted">Change Password (optional)</h6>
                </div>
                <div class="col-md-6">
                  <label class="form-label">New Password</label>
                  <input
                    type="password"
                    id="editNewPwd"
                    class="form-control"
                    placeholder="Leave blank to keep current"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">Confirm Password</label>
                  <input
                    type="password"
                    id="editConfirmPwd"
                    class="form-control"
                    placeholder="Repeat new password"
                  />
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" data-bs-dismiss="modal">
              Cancel
            </button>
            <button class="btn btn-primary" onclick="saveProfile()">
              <i class="fas fa-save me-1"></i>Save Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../../data/mock-data.js"></script>
    <script src="../../assets/js/app.js"></script>
    <script>
      let currentStudent;

      document.addEventListener("DOMContentLoaded", () => {
        const session = requireAuth("student");
        if (!session) return;
        currentStudent = getStudentById(session.id) || getStudents()[0];
        renderProfile();
      });

      function renderProfile() {
        const s = currentStudent;
        const subjects = getSubjects();
        const grades = getStudentGrades(s.id);
        const initials = (s.firstName[0] + s.lastName[0]).toUpperCase();
        document.getElementById("sidebarAvatar").textContent = initials;
        document.getElementById("topbarAvatar").textContent = initials;
        document.getElementById("sidebarName").textContent = s.name;
        document.getElementById("sidebarStudentId").textContent = s.studentId;
        document
          .getElementById("profileAvatarLg")
          .querySelector("#profileInitials").textContent = initials;
        document.getElementById("profileName").textContent = s.name;
        document.getElementById("profileStudentId").textContent = s.studentId;
        document.getElementById("profileGradeSection").textContent =
          `Grade ${s.gradeLevel} – ${s.section}`;

        const avg = grades.length ? calcAverage(grades.map((g) => g.grade)) : 0;
        const passed = grades.filter((g) => g.grade >= 75).length;
        document.getElementById("profileAvg").textContent = avg;
        document.getElementById("profilePassed").textContent = passed;
        document.getElementById("profileSubjects").textContent =
          subjects.length;

        document.getElementById("personalInfo").innerHTML = `
    <div class="info-row"><span class="info-label">Full Name</span><span class="info-value">${s.name}</span></div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-value">${s.email}</span></div>
    <div class="info-row"><span class="info-label">Contact</span><span class="info-value">${s.contact || "—"}</span></div>
    <div class="info-row"><span class="info-label">Birthdate</span><span class="info-value">${fmtDate(s.birthdate)}</span></div>
    <div class="info-row"><span class="info-label">Gender</span><span class="info-value">${s.gender || "—"}</span></div>
    <div class="info-row"><span class="info-label">Address</span><span class="info-value">${s.address || "—"}</span></div>
    <div class="info-row"><span class="info-label">Guardian</span><span class="info-value">${s.guardianName || "—"}</span></div>
    <div class="info-row"><span class="info-label">Guardian Contact</span><span class="info-value">${s.guardianContact || "—"}</span></div>`;

        document.getElementById("academicInfo").innerHTML = `
    <div class="info-row"><span class="info-label">Student ID</span><span class="info-value">${s.studentId}</span></div>
    <div class="info-row"><span class="info-label">Grade Level</span><span class="info-value">Grade ${s.gradeLevel}</span></div>
    <div class="info-row"><span class="info-label">Section</span><span class="info-value">${s.section}</span></div>
    <div class="info-row"><span class="info-label">School Year</span><span class="info-value">2024–2025</span></div>
    <div class="info-row"><span class="info-label">Status</span><span class="info-value"><span class="badge bg-success">${s.enrollmentStatus}</span></span></div>
    <div class="info-row"><span class="info-label">School</span><span class="info-value">Lubo National High School</span></div>`;
      }

      function openEditModal() {
        const s = currentStudent;
        document.getElementById("editFirst").value = s.firstName;
        document.getElementById("editLast").value = s.lastName;
        document.getElementById("editEmail").value = s.email;
        document.getElementById("editContact").value = s.contact || "";
        document.getElementById("editBirthdate").value = s.birthdate || "";
        document.getElementById("editGender").value = s.gender || "";
        document.getElementById("editAddress").value = s.address || "";
        document.getElementById("editGuardian").value = s.guardianName || "";
        document.getElementById("editGuardianContact").value =
          s.guardianContact || "";
        document.getElementById("editNewPwd").value = "";
        document.getElementById("editConfirmPwd").value = "";
        new bootstrap.Modal(document.getElementById("editProfileModal")).show();
      }

      function saveProfile() {
        const newPwd = document.getElementById("editNewPwd").value;
        const confPwd = document.getElementById("editConfirmPwd").value;
        if (newPwd && newPwd !== confPwd) {
          showToast("Passwords do not match.", "error");
          return;
        }

        const students = getStudents();
        const idx = students.findIndex((s) => s.id === currentStudent.id);
        if (idx === -1) {
          showToast("Student not found.", "error");
          return;
        }

        const firstName = document.getElementById("editFirst").value.trim();
        const lastName = document.getElementById("editLast").value.trim();
        students[idx] = {
          ...students[idx],
          firstName,
          lastName,
          name: `${firstName} ${lastName}`,
          email: document.getElementById("editEmail").value.trim(),
          contact: document.getElementById("editContact").value.trim(),
          birthdate: document.getElementById("editBirthdate").value,
          gender: document.getElementById("editGender").value,
          address: document.getElementById("editAddress").value.trim(),
          guardianName: document.getElementById("editGuardian").value.trim(),
          guardianContact: document
            .getElementById("editGuardianContact")
            .value.trim(),
          ...(newPwd ? { password: newPwd } : {}),
        };
        saveStudents(students);
        currentStudent = students[idx];
        // Update session name
        const sess = getSession();
        setSession({ ...sess, name: students[idx].name });
        bootstrap.Modal.getInstance(
          document.getElementById("editProfileModal"),
        ).hide();
        renderProfile();
        showToast("Profile updated successfully!", "success");
      }
    </script>
  </body>
</html>
