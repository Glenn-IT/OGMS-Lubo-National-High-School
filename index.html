<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OGMS – Login | Lubo National High School</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="auth-card">
        <div class="school-logo"><i class="fas fa-graduation-cap"></i></div>
        <h2>OGMS</h2>
        <p class="subtitle">
          Online Grade Monitoring System<br />Lubo National High School
        </p>

        <!-- Tabs -->
        <ul class="nav auth-tabs justify-content-center mb-3" id="authTabs">
          <li class="nav-item">
            <button class="nav-link active" onclick="showTab('student')">
              Student
            </button>
          </li>
          <li class="nav-item">
            <button class="nav-link" onclick="showTab('admin')">Admin</button>
          </li>
        </ul>

        <!-- Student Login Form -->
        <div id="studentTab">
          <form id="studentLoginForm" onsubmit="studentLogin(event)">
            <div class="mb-3">
              <label class="form-label">Email Address</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-envelope"></i
                ></span>
                <input
                  type="email"
                  id="stuEmail"
                  class="form-control"
                  placeholder="student@lnhs.edu.ph"
                  value="student@lnhs.edu.ph"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-lock"></i
                ></span>
                <input
                  type="password"
                  id="stuPassword"
                  class="form-control"
                  placeholder="Enter password"
                  value="student123"
                  required
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="togglePwd('stuPassword', this)"
                  style="border-radius: 0 8px 8px 0"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <div class="d-flex justify-content-between mb-3">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="rememberMe"
                />
                <label
                  class="form-check-label"
                  style="font-size: 0.8rem"
                  for="rememberMe"
                  >Remember me</label
                >
              </div>
              <a
                href="views/student/forgot-password.html"
                style="font-size: 0.8rem; color: var(--primary)"
                >Forgot Password?</a
              >
            </div>
            <button type="submit" class="btn-primary-custom">
              <i class="fas fa-sign-in-alt me-2"></i>Login as Student
            </button>
          </form>
          <div class="divider"><span>or</span></div>
          <div class="text-center">
            <span style="font-size: 0.85rem; color: #64748b"
              >Don't have an account?
            </span>
            <a
              href="views/student/signup.html"
              style="
                color: var(--primary);
                font-weight: 600;
                font-size: 0.85rem;
              "
              >Sign Up</a
            >
          </div>
          <!-- Demo hint -->
          <div
            class="mt-3 p-2 rounded"
            style="background: #f0fdf4; border: 1px solid #bbf7d0"
          >
            <p class="mb-0" style="font-size: 0.75rem; color: #166534">
              <i class="fas fa-info-circle me-1"></i>
              Demo: <strong>student@lnhs.edu.ph</strong> /
              <strong>student123</strong>
            </p>
          </div>
        </div>

        <!-- Admin Login Form -->
        <div id="adminTab" style="display: none">
          <form id="adminLoginForm" onsubmit="adminLogin(event)">
            <div class="mb-3">
              <label class="form-label">Admin Email</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-user-shield"></i
                ></span>
                <input
                  type="email"
                  id="adminEmail"
                  class="form-control"
                  placeholder="admin@lnhs.edu.ph"
                  value="admin@lnhs.edu.ph"
                  required
                />
              </div>
            </div>
            <div class="mb-3">
              <label class="form-label">Password</label>
              <div class="input-group">
                <span class="input-group-text"
                  ><i class="fas fa-lock"></i
                ></span>
                <input
                  type="password"
                  id="adminPassword"
                  class="form-control"
                  placeholder="Enter password"
                  value="admin123"
                  required
                />
                <button
                  type="button"
                  class="btn btn-outline-secondary"
                  onclick="togglePwd('adminPassword', this)"
                  style="border-radius: 0 8px 8px 0"
                >
                  <i class="fas fa-eye"></i>
                </button>
              </div>
            </div>
            <button
              type="submit"
              class="btn-primary-custom"
              style="background: linear-gradient(135deg, #7c3aed, #a78bfa)"
            >
              <i class="fas fa-shield-alt me-2"></i>Login as Admin
            </button>
          </form>
          <div
            class="mt-3 p-2 rounded"
            style="background: #faf5ff; border: 1px solid #e9d5ff"
          >
            <p class="mb-0" style="font-size: 0.75rem; color: #6b21a8">
              <i class="fas fa-info-circle me-1"></i>
              Demo: <strong>admin@lnhs.edu.ph</strong> /
              <strong>admin123</strong>
            </p>
          </div>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="data/mock-data.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
      // Redirect if already logged in
      const sess = getSession();
      if (sess) {
        window.location.href =
          sess.role === "admin"
            ? "views/admin/dashboard.html"
            : "views/student/dashboard.html";
      }

      function showTab(tab) {
        document.getElementById("studentTab").style.display =
          tab === "student" ? "block" : "none";
        document.getElementById("adminTab").style.display =
          tab === "admin" ? "block" : "none";
        document.querySelectorAll(".auth-tabs .nav-link").forEach((el, i) => {
          el.classList.toggle(
            "active",
            (i === 0 && tab === "student") || (i === 1 && tab === "admin"),
          );
        });
      }

      function togglePwd(id, btn) {
        const el = document.getElementById(id);
        const show = el.type === "password";
        el.type = show ? "text" : "password";
        btn.innerHTML = `<i class="fas fa-eye${show ? "-slash" : ""}"></i>`;
      }

      function studentLogin(e) {
        e.preventDefault();
        const email = document
          .getElementById("stuEmail")
          .value.trim()
          .toLowerCase();
        const pwd = document.getElementById("stuPassword").value;
        simulateLoading(() => {
          const students = getStudents();
          const found = students.find(
            (s) => s.email.toLowerCase() === email && s.password === pwd,
          );
          if (found) {
            setSession({
              id: found.id,
              name: found.name,
              email: found.email,
              role: "student",
              studentId: found.studentId,
            });
            showToast(`Welcome back, ${found.firstName}!`, "success");
            setTimeout(
              () => (window.location.href = "views/student/dashboard.html"),
              800,
            );
          } else {
            showToast("Invalid email or password.", "error");
          }
        });
      }

      function adminLogin(e) {
        e.preventDefault();
        const email = document
          .getElementById("adminEmail")
          .value.trim()
          .toLowerCase();
        const pwd = document.getElementById("adminPassword").value;
        simulateLoading(() => {
          const admin = getAdmin();
          if (admin.email.toLowerCase() === email && admin.password === pwd) {
            setSession({
              id: admin.id,
              name: admin.name,
              email: admin.email,
              role: "admin",
            });
            showToast("Welcome, Administrator!", "success");
            setTimeout(
              () => (window.location.href = "views/admin/dashboard.html"),
              800,
            );
          } else {
            showToast("Invalid admin credentials.", "error");
          }
        });
      }
    </script>
  </body>
</html>
